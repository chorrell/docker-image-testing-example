name: Serverspec

on: push

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        ruby-version: ['3.4', '4.0']
      fail-fast: false

    name: Ruby ${{ matrix.ruby-version }}

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - name: Set up Ruby ${{ matrix.ruby-version }}
      uses: ruby/setup-ruby@0dafeac902942906541bc140009cdbf32665b601 # v1.315.0
      with:
        ruby-version: ${{ matrix.ruby-version }}
        bundler-cache: false
    - name: Install gems
      run: bundle install
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      with:
        driver-opts: network=host
    - name: Build Node.js 22 image
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: ./22
        load: true
        tags: node-test:22
        cache-from: type=gha,scope=node22
        cache-to: type=gha,mode=max,scope=node22
    - name: Build Node.js 24 image
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: ./24
        load: true
        tags: node-test:24
        cache-from: type=gha,scope=node24
        cache-to: type=gha,mode=max,scope=node24
    - name: Run tests
      run: bundle exec rake
