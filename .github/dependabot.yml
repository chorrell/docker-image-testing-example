version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:30"
      timezone: "America/Toronto"
    pull-request-branch-name:
      separator: "/"
    commit-message:
      prefix: "ci"
      include: "scope"
    cooldown:
      default-days: 7

  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:45"
      timezone: "America/Toronto"
    pull-request-branch-name:
      separator: "/"
    commit-message:
      prefix: "bundler"
      include: "scope"
    cooldown:
      default-days: 7

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:55"
      timezone: "America/Toronto"
    pull-request-branch-name:
      separator: "/"
    commit-message:
      prefix: "docker"
      include: "scope"
    cooldown:
      default-days: 7

  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "daily"
      time: "10:00"
      timezone: "America/Toronto"
    pull-request-branch-name:
      separator: "/"
    commit-message:
      prefix: "chore"
      include: "scope"
    cooldown:
      default-days: 7
