version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "America/Toronto"
    pull-request-branch-name:
      separator: "/"
    commit-message:
      prefix: "ci"
      include: "scope"
    cooldown:
      default-days: 7

  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:55"
      timezone: "America/Toronto"
    pull-request-branch-name:
      separator: "/"
    commit-message:
      prefix: "bundler"
      include: "scope"
    cooldown:
      default-days: 7

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:45"
      timezone: "America/Toronto"
    pull-request-branch-name:
      separator: "/"
    commit-message:
      prefix: "docker"
      include: "scope"
    cooldown:
      default-days: 7

